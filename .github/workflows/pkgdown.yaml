# Manual-only pkgdown build.
#
# Why: the workshop vignettes load gigabytes of WorldClim/LST rasters from
# `data/processed/` and `temporal_rasters/`, plus they call GBIF. None of
# that exists on a fresh CI runner, so an automatic CI build can't render
# the articles. The canonical workflow is to build locally
# (`source("scripts/build_pkgdown_site.R")`) and deploy with
# `pkgdown::deploy_to_branch()`.
#
# This workflow is kept around — but gated behind workflow_dispatch only —
# so you can still kick off a CI build manually from the Actions tab if you
# ever ship the data in some other way (release artifact, LFS, etc.).
on:
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
