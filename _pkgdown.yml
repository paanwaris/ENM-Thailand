url: https://paanwaris.github.io/ENM-Thailand/

template:
  bootstrap: 5
  bslib:
    primary: "#1B6E3F"
    secondary: "#F2B705"

home:
  title: ENM-Thailand workshop 2026
  description: |
    A three-day hands-on workshop on ecological niche modelling (ENM) and
    species distribution modelling (SDM), built around three modern R
    packages — nicheR, bean, and TemporalModelR — with Sambar deer
    (*Rusa unicolor*) in Thailand as the case study.
  links:
    - text: Workshop GitHub repo
      href: https://github.com/paanwaris/ENM-Thailand
    - text: nicheR
      href: https://github.com/castanedaM/nicheR
    - text: bean
      href: https://github.com/paanwaris/bean
    - text: TemporalModelR
      href: https://cjhughes926.github.io/TemporalModelR/

navbar:
  structure:
    left:  [home, intro, workshop]
    right: [search, github]
  components:
    workshop:
      text: Workshop days
      menu:
        - text: Day 1 — Virtual species with nicheR
          href: articles/Day1_nicheR.html
        - text: Day 2a — Data download
          href: articles/Day2a_Data_Download.html
        - text: Day 2b — Thinning with bean
          href: articles/Day2b_Bean_Processing.html
        - text: Day 3 — Temporally-explicit SDMs
          href: articles/Day3_TemporalModelR.html

articles:
  - title: Workshop days
    desc: >
      Three-day ENM/SDM workshop in Thailand. Knit Day 2a first so the shared
      inputs land in `data/processed/`; Day 1, Day 2b, and Day 3 are then
      independent of one another.
    navbar: ~
    contents:
      - Day1_nicheR
      - Day2a_Data_Download
      - Day2b_Bean_Processing
      - Day3_TemporalModelR

authors:
  Paanwaris Paansri:
    href: https://orcid.org/0000-0001-9992-098X
  Luis E. Escobar:
    href: https://orcid.org/0000-0001-5735-2750
